<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background-color: #f1f3f6;
            margin-top: 5.4%;
        }
        .login {
            width: 350px;
            background-color: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.2);
        }
        .login h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2874f0;
        }
        label {
            font-weight: bold;
        }
        form input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .loginbutton {
            width: 100%;
            background-color: #fb641b;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .loginbutton:hover {
            background-color: #e85a15;
        }
        .text {
            text-align: center;
            margin-top: 20px;
        }
        .text a {
            text-decoration: none;
            color: #2874f0;
        }
    </style>
</head>
<body>
    <div id="header"></div>
    <div class="login">
        <h2>Login</h2>
        <form>
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
            <label>Password</label>
            <input type="password" placeholder="Enter password" minlength="8" required>
            <button type="button" class="loginbutton" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
        </form>
        <div class="text"><p>New User?<a href="register.html">Create Account</a></p></div>
    </div>
    <div class="fade" id="loginModal">
        <div class="dialog">
            <div class="content">
                <div class="header">
                    <h5 class="title">Login Successful</h5>
                    <button type="button" class="buttonclose" data-bs-dismiss="modal"></button>
                </div>
                <div class="body">Welcome to Flipkart Clone Website.</div>
                <div class="footer"><button type="button" class="end" data-bs-dismiss="modal">OK</button></div>
            </div>
        </div>
    </div>
    <div id="footer"></div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
