<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: #f1f3f6;
            margin-top: 5.4%;
        }
        .container{
            width: 80%;
            margin: auto;
            margin-top: 40px;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
        }
        h1{
            color: #2874f0;
            margin-bottom: 20px;
        }
        .box{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .form{
            width: 55%;
        }
        .contact-info{
            width: 35%;
            background-color: #fafafa;
            padding: 20px;
            border-radius: 5px;
        }
        label{
            font-weight: bold;
        }
        form input,form textarea{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea{
            resize: none;
        }
        button{
            background-color: #2874f0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover{
            background-color: #1259c3;
        }
        .contact-info p{
            margin-bottom: 20px;
            line-height: 25px;
        }
    </style>
</head>
<body>
    <div id="header"></div>
    <div class="container">
        <h1>Contact Us</h1>
        <div class="box">
            <div class="form">
                <form>
                    <label>Full Name:</label>
                    <input type="text" placeholder="Enter your name" required>
                    <label>Email Address:</label>
                    <input type="email"placeholder="Enter your email" required>
                    <label>Message:</label>
                    <textarea rows="6" placeholder="Enter your message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            <div class="contactinfo">
                <h2 style="margin-bottom:20px;">Get In Touch</h2>
                <p><strong>Address:</strong><br>Ahmedabad, Gujarat, India</p>
                <p><strong>Phone:</strong><br>+91 9876543210</p>
                <p><strong>Email:</strong><br>support@flipkartclone.com</p>
                <p><strong>Working Hours:</strong><br>Monday - Saturday<br>9:00 AM to 6:00 PM</p>
            </div>
        </div>
    </div>
    <div id="footer"></div>
    <script src="main.js"></script>
</body>
</html>
