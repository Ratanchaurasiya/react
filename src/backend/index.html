<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <a href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">  </a>
    <title>Flipkart Clone - Home</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: #f1f3f6;
            margin-top: 5.4%;
        }
        .banner{
            width: 100%;
            height: 300px;
            background-image: url('zphoto-1523275335684-37898b6baf30.jpg');
            background-size: cover;
            background-position: center;
            margin-bottom: 20px;
        }
        .categories{
            background-color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 5px;
        }
        .categories h2{
            margin-bottom: 15px;
        }
        .category1{
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .category2{
            padding: 15px;
            transition: 0.3s;
        }
        .category2:hover{
            transform: scale(1.05);
        }
        .category2 img{
            width: 80px;
            height: 80px;
        }
        .category3{
            padding: 15px;
            transition: 0.3s;
        }
        .category3:hover{
            transform: scale(1.05);
        }
        .category3 img{
            width: 80px;
            height: 80px;
        }
        .category4{
            padding: 15px;
            transition: 0.3s;
        }
        .category4:hover{
            transform: scale(1.05);
        }
        .category4 img{
            width: 80px;
            height: 80px;
        }.category5{
            padding: 15px;
            transition: 0.3s;
        }
        .category5:hover{
            transform: scale(1.05);
        }
        .category5 img{
            width: 80px;
            height: 80px;
        }
        .products{
            margin: 20px;
        }
        .products h2{
            margin-bottom: 15px;
        }
        .product-container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product-card{
            background-color: white;
            width: 220px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }
        .product-card:hover{
            transform: translateY(-5px);
        }
        .product-card img{
            width: 150px;
            height: 150px;
        }
        .product-card h3{
            margin-top: 10px;
            font-size: 18px;
        }
        .price{
            color: green;
            font-weight: bold;
            margin-top: 8px;
        }
        .btn{
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background-color: #fb641b;
            color: white;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover{
            background-color: #e85a15;
        }
    </style>
</head>
<body>
    <div id="header"></div>
    <div class="banner"></div>
    <section class="categories">
        <h2>Categories</h2>
        <div class="category1">
            <div class="category2">
                <img src="zmobile.png">
                <p>Mobiles</p>
            </div>
            <div class="category3">
                <img src="zelectronic.png">
                <p>Electronics</p>
            </div>
            <div class="category4">
                <img src="zfashion.png">
                <p>Fashion</p>
            </div>
            <div class="category5">
                <img src="zmakeup-pouch.png">
                <p>Beauty</p>
            </div>
        </div>
    </section>
    <section class="products">
        <h2>Featured Products</h2>
        <div class="product-container">
            <div class="product-card">
                <img src="ziphone15.jpg">
                <h3>iPhone 15</h3>
                <p class="price">₹79,999</p>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="zmac.jpg">
                <h3>Mac Book Air 2018</h3>
                <p class="price">₹69,999</p>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="zsamsunglaptop.jpg">
                <h3>Galaxy Book 2025</h3>
                <p class="price">₹1,40,999</p>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="zmacbook.jpg">
                <h3>Mac Book Air 2024</h3>
                <p class="price">₹1,04,999</p>
                <button class="btn">Add to Cart</button>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    <script src="main.js"></script>
</body>
</html>
